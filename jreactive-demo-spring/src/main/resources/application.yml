# ==========================================
#  CONFIGURACIÓN BASE (Por defecto / DEV)
# ==========================================
server:
  port: 8080
  
spring:
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1  

jreactive:
  # En DEV usamos RAM: es rápido, no requiere instalar Redis y limpia todo al reiniciar.
  store:
    type: ram
  
  # Ajustes finos del WebSocket (Backpressure para que el cliente no se ahogue)
  ws:
    persistent-state: true
    enabled-backpressure: true
    max-queue: 1024
    flush-interval-ms: 16

---
# ==========================================
#  PERFIL DE PRODUCCIÓN (PROD)
# ==========================================
# Se activa con: java -jar app.jar --spring.profiles.active=prod
spring:
  config:
    activate:
      on-profile: prod
  threads:
    virtual:
      enabled: true     

jreactive:
  # En PROD usamos Híbrido: Velocidad de RAM + Persistencia de Redis
  store:
    type: hybrid
    # 🔥 ESTRATEGIA DE SERIALIZACIÓN (Nuevo)
    # Opciones:
    #   - json: (Default) Usa Jackson. Más robusto, legible en Redis, tolerante a cambios de clase.
    #   - fst:  (Turbo) Serialización binaria. Ultra-rápida, payload mínimo, pero frágil si cambias el código.
    serialization: json 
    
    # Configuración de consistencia para HybridStore
    #   - strong: (Default) Escribe en Redis antes de confirmar (más seguro).
    #   - eventual: Escribe en RAM y luego asíncrono a Redis (más rápido, riesgo de pérdida si crash).
    consistency: strong
  
  redis:
    # Cambia esto por la IP real de tu Redis en producción
    host: localhost 
    port: 6379